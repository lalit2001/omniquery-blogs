<svg width="960" height="480" viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(6,182,212,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="#030712"/>
  <rect width="960" height="480" fill="url(#grid)"/>

  <!-- Title -->
  <rect x="300" y="16" width="360" height="22" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.5" shape-rendering="crispEdges"/>
  <text x="480" y="31" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" letter-spacing="2.5">AI for BI vs TRADITIONAL BI</text>

  <!-- Center divider -->
  <rect x="478" y="48" width="2" height="400" fill="#06b6d4" fill-opacity="0.15" shape-rendering="crispEdges"/>
  <text x="480" y="44" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#06b6d4" fill-opacity="0.5">VS</text>

  <!-- ===== LEFT HALF: Traditional BI ===== -->
  <rect x="20" y="48" width="200" height="22" fill="#f97316" fill-opacity="0.08" stroke="#f97316" stroke-width="0.5" shape-rendering="crispEdges"/>
  <text x="120" y="62" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#f97316" letter-spacing="1.5">TRADITIONAL BI</text>

  <!-- Row 1 -->
  <g transform="translate(20, 82)">
    <rect width="450" height="50" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">TIME TO INSIGHT</text>
    <text x="10" y="32" font-family="'Courier New', monospace" font-size="13" fill="#f97316" font-weight="bold">Days to Weeks</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Requires analyst + SQL + dashboard build</text>
    <!-- Warning icon -->
    <rect x="410" y="14" width="30" height="20" fill="#f97316" fill-opacity="0.1" shape-rendering="crispEdges"/>
    <text x="425" y="27" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#f97316">⚠</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(20, 143)">
    <rect width="450" height="50" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">USER REQUIREMENT</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#f97316">SQL + BI Tool Expertise</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Tableau, Power BI, Looker training needed</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(20, 204)">
    <rect width="450" height="50" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">AD-HOC QUERIES</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#f97316">Pre-built only</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">New question = new ticket to data team</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(20, 265)">
    <rect width="450" height="50" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">MULTI-SOURCE DATA</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#f97316">Manual ETL pipelines</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Siloed, slow to update, brittle joins</text>
  </g>

  <!-- Row 5 -->
  <g transform="translate(20, 326)">
    <rect width="450" height="50" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">SCALABILITY</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#f97316">Hire more analysts</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Bottleneck grows with org size</text>
  </g>

  <!-- Row 6 -->
  <g transform="translate(20, 387)">
    <rect width="450" height="54" fill="#060c18" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#f97316" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">ERROR HANDLING</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#f97316">Manual debugging</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Wrong query = wrong decision, silent errors</text>
  </g>


  <!-- ===== RIGHT HALF: AI for BI (OmniQuery) ===== -->
  <rect x="490" y="48" width="450" height="22" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.5" shape-rendering="crispEdges"/>
  <text x="715" y="62" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" letter-spacing="1.5">AI for BI (OMNIQUERY)</text>

  <!-- Row 1 -->
  <g transform="translate(490, 82)">
    <rect width="450" height="50" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">TIME TO INSIGHT</text>
    <text x="10" y="32" font-family="'Courier New', monospace" font-size="13" fill="#4ade80" font-weight="bold">Seconds</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Ask in plain English → result in &lt;500ms</text>
    <!-- Bar fill indicator -->
    <rect x="200" y="22" width="240" height="6" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3" shape-rendering="crispEdges"/>
    <rect x="201" y="23" width="236" height="4" fill="#4ade80" fill-opacity="0.6" shape-rendering="crispEdges">
      <animate attributeName="width" values="0;236;236" dur="2s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <circle cx="430" cy="10" r="3" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Row 2 -->
  <g transform="translate(490, 143)">
    <rect width="450" height="50" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">USER REQUIREMENT</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">Plain English Only</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Zero SQL or BI tool knowledge needed</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(490, 204)">
    <rect width="450" height="50" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">AD-HOC QUERIES</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">Unlimited, instant</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Any question, any time — no waiting</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(490, 265)">
    <rect width="450" height="50" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">MULTI-SOURCE DATA</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">Federated query via Trino</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">PG + MongoDB + Snowflake in one query</text>
  </g>

  <!-- Row 5 -->
  <g transform="translate(490, 326)">
    <rect width="450" height="50" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">SCALABILITY</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">Scales with every new user</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Same AI layer serves 1 or 10,000 users</text>
  </g>

  <!-- Row 6 -->
  <g transform="translate(490, 387)">
    <rect width="450" height="54" fill="#060c18" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5" shape-rendering="crispEdges"/>
    <rect x="0" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <rect x="447" y="0" width="3" height="3" fill="#4ade80" shape-rendering="crispEdges"/>
    <text x="10" y="14" font-family="'Courier New', monospace" font-size="8" fill="#94a3b8" letter-spacing="0.5">ERROR HANDLING</text>
    <text x="10" y="30" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">AI self-heals SQL (auto-retry × 3)</text>
    <text x="10" y="44" font-family="'Courier New', monospace" font-size="7" fill="#64748b">Validates query, retries with error context</text>
  </g>

  <!-- ===== WATERMARK ===== -->
  <g transform="translate(764, 432)" opacity="0.55">
    <rect width="36" height="36" fill="#060c18" shape-rendering="crispEdges"/>
    <rect width="36" height="36" fill="none" stroke="#06b6d4" stroke-width="0.75" stroke-opacity="0.40" shape-rendering="crispEdges"/>
    <g transform="scale(0.75)" filter="url(#glow)">
      <rect x="6.5"  y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="12.5" y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="18.5" y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="24.5" y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="30.5" y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="36.5" y="0.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="6.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="42.5" y="6.5"  width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="12.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="42.5" y="12.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="18.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="42.5" y="18.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="24.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="12.5" y="24.5" width="5" height="5" fill="#8b5cf6" shape-rendering="crispEdges"/>
      <rect x="18.5" y="24.5" width="5" height="5" fill="#8b5cf6" shape-rendering="crispEdges"/>
      <rect x="24.5" y="24.5" width="5" height="5" fill="#8b5cf6" shape-rendering="crispEdges"/>
      <rect x="42.5" y="24.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="30.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="12.5" y="30.5" width="5" height="5" fill="#8b5cf6" shape-rendering="crispEdges"/>
      <rect x="18.5" y="30.5" width="5" height="5" fill="#8b5cf6" shape-rendering="crispEdges"/>
      <rect x="42.5" y="30.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="0.5"  y="36.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="12.5" y="36.5" width="5" height="5" fill="#f59e0b" shape-rendering="crispEdges">
        <animate attributeName="opacity" dur="1.1s" values="1;0;1" repeatCount="indefinite"/>
      </rect>
      <rect x="42.5" y="36.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="6.5"  y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="12.5" y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="18.5" y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="24.5" y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="30.5" y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
      <rect x="36.5" y="42.5" width="5" height="5" fill="#06b6d4" shape-rendering="crispEdges"/>
    </g>
    <text x="42" y="24" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="700" letter-spacing="-0.2" fill="white">OmniQuery<tspan fill="#06b6d4">.ai</tspan></text>
  </g>

</svg>
